// CANDIDATE DOSSIER — Layers 1 (Ingest) · 2 (Orchestration) · 3 (Dossier)
// Wires existing tool run()s + buildSources() into one external-validation product.
// ══════════════════════════════════════════════════════════════════════════════

// ── LAYER 1: INGEST ───────────────────────────────────────────────────────────
function dossierHTML() {
  const gd = (document.getElementById('gDisease')||{}).value || '';
  const ex = [
    {lbl:'KRAS G12C · Sotorasib · NSCLC', target:'KRAS', compound:'Sotorasib', indication:'Non-small cell lung cancer'},
    {lbl:'EGFR · Osimertinib · NSCLC', target:'EGFR', compound:'Osimertinib', indication:'Non-small cell lung cancer'},
    {lbl:'BRAF · Vemurafenib · Melanoma', target:'BRAF', compound:'Vemurafenib', indication:'Melanoma'},
    {lbl:'BCL2 · Venetoclax · CLL', target:'BCL2', compound:'Venetoclax', indication:'Chronic lymphocytic leukemia'}
  ];
  const chips = ex.map((e,i)=>`<span class="chip" onclick="applyDossierEx(${i})">${e.lbl}</span>`).join('');
  window._dossierEx = ex;
  return `<div class="dh-hero">
    <span class="dh-pill">◆ Flagship · Candidate Risk Dossier</span>
    <h1 class="dh-title">One candidate in. <em>One cited verdict out.</em></h1>
    <p class="dh-sub">Your model tells you which molecules to make. DrugIQ tells you — in seconds, with a citation for every claim — what the public scientific record already knows about each one, so you can kill the doomed candidates before the wet lab does it at 100× the cost. Enter a target, a compound, and an indication; we fan out across genetic validation, chemical liabilities, prior-failure precedent, and the competitive trial landscape, then fuse it into a single External Evidence Score.</p>
  </div>
  <div class="fcard">
    <div class="frow">
      <div class="fg"><label class="flbl">Target (gene / protein) *</label><input class="fin" id="f-d-target" type="text" placeholder="e.g. KRAS, EGFR, BCL2"></div>
      <div class="fg"><label class="flbl">Compound (name or SMILES) *</label><input class="fin" id="f-d-compound" type="text" placeholder="e.g. Sotorasib  ·  or a SMILES string"></div>
      <div class="fg"><label class="flbl">Indication (disease) *</label><input class="fin" id="f-d-indication" type="text" placeholder="e.g. Non-small cell lung cancer" value="${gd.replace(/"/g,'&quot;')}"></div>
    </div>
    <div class="chips"><span style="font-family:var(--mono);font-size:10px;color:var(--text3);padding-top:4px">Try:</span>${chips}</div>
    <div style="margin-top:1rem"><button class="runbtn" id="runbtn" onclick="runDossier()"><svg width="12" height="12" viewBox="0 0 12 12"><polygon points="2,1 11,6 2,11" fill="#0a0e0b"/></svg>Generate Dossier</button></div>
  </div>
  <div id="out"></div>`;
}

function applyDossierEx(i){
  const e = (window._dossierEx||[])[i]; if(!e) return;
  const t=document.getElementById('f-d-target'), c=document.getElementById('f-d-compound'), d=document.getElementById('f-d-indication');
  if(t) t.value=e.target; if(c) c.value=e.compound; if(d) d.value=e.indication;
}

// Detect SMILES vs plain name (best-effort; SMILES tends to contain these tokens)
function looksLikeSMILES(s){
  if(!s) return false;
  return /[=#\[\]()@]/.test(s) && /[A-Za-z]/.test(s) && !/\s/.test(s);
}

// ── LAYER 2: ORCHESTRATION ──────────────────────────────────────────────────
// Fan out across existing tool run()s in parallel. Each probe is isolated so one
// failure never kills the dossier — it just marks that probe degraded.
const DOSSIER_PROBES = [
  {key:'target',    tool:'targetscope',  label:'Target validation',   build:(c)=>({disease:c.indication})},
  {key:'variant',   tool:'alphamissense',label:'Variant risk',        build:(c)=>({gene:c.target, variant:'', disease_context:c.indication}), skipIf:(c)=>true},
  {key:'binding',   tool:'bindpredict',  label:'Target–compound binding', build:(c)=>({target:c.target, compound:c.compoundName, disease:c.indication})},
  {key:'chem',      tool:'molprofile',   label:'Chemical liabilities', build:(c)=>({compound:c.compoundName, target_context:c.target+' for '+c.indication})},
  {key:'priorart',  tool:'repurposerx',  label:'Prior-failure precedent', build:(c)=>({disease:c.indication})},
  {key:'trials',    tool:'trialmatch',   label:'Competitive trial landscape', build:(c)=>({disease:c.indication})}
];

async function orchestrate(candidate){
  // Note: alphamissense needs a specific variant; without one we skip it gracefully.
  const active = DOSSIER_PROBES.filter(pr => !(pr.skipIf && pr.skipIf(candidate)));
  const settled = await Promise.allSettled(active.map(async pr => {
    const params = pr.build(candidate);
    const data = await callTool(pr.tool, params);
    return { key: pr.key, tool: pr.tool, label: pr.label, data };
  }));
  const probes = {};
  active.forEach((pr, i) => {
    const r = settled[i];
    if (r.status === 'fulfilled') {
      probes[pr.key] = { ok:true, tool:pr.tool, label:pr.label, data:r.value.data };
    } else {
      probes[pr.key] = { ok:false, tool:pr.tool, label:pr.label, error:(r.reason&&r.reason.message)||'unreachable' };
    }
  });
  return probes;
}

async function runDossier(){
  const btn=document.getElementById('runbtn'), out=document.getElementById('out');
  const target=(document.getElementById('f-d-target')||{}).value?.trim()||'';
  const compound=(document.getElementById('f-d-compound')||{}).value?.trim()||'';
  const indication=(document.getElementById('f-d-indication')||{}).value?.trim()||'';
  if(!target||!compound||!indication){ out.innerHTML=eHTML('Please fill in target, compound, and indication.',true); return; }
  document.getElementById('gDisease').value=indication;
  const isSmiles=looksLikeSMILES(compound);
  const candidate={ target, compound, compoundName: isSmiles?compound:compound, indication, isSmiles };
  btn.disabled=true;
  out.innerHTML=dossierLoadHTML();
  gtag('event','dossier_run',{target,indication});
  try{
    const [probes] = await Promise.all([orchestrate(candidate), dossierAnim()]);
    out.innerHTML=renderDossier(candidate, probes);
    gtag('event','dossier_result',{success:true});
  }catch(e){
    out.innerHTML=eHTML(e.message||'Dossier generation failed');
    gtag('event','dossier_result',{success:false,error:e.message});
  }
  btn.disabled=false;
}

const DOSSIER_STEPS=['Resolving target genetic validation','Profiling compound chemical liabilities','Scanning prior-failure & precedent','Mapping competitive trial landscape','Fusing evidence & scoring'];
function dossierLoadHTML(){
  return `<div class="lcard"><div class="spinner"></div><p style="font-family:var(--mono);font-size:12px;color:var(--text3)">Running ${DOSSIER_PROBES.filter(p=>!(p.skipIf&&p.skipIf({}))).length} parallel evidence probes…</p><div class="lsteps">${DOSSIER_STEPS.map((s,i)=>`<div class="lstep" id="ls-${i}"><div class="sdot ${i===0?'active':''}"></div><span>${s}</span></div>`).join('')}</div></div>`;
}
async function dossierAnim(){
  for(let i=0;i<DOSSIER_STEPS.length-1;i++){
    await new Promise(r=>setTimeout(r,650+Math.random()*500));
    const c=document.getElementById('ls-'+i), n=document.getElementById('ls-'+(i+1));
    if(!c) break;
    c.querySelector('.sdot').className='sdot done'; c.classList.add('done');
    if(n){n.querySelector('.sdot').className='sdot active';n.classList.add('active');}
  }
}

// ── LAYER 3: THE DOSSIER ──────────────────────────────────────────────────────
// Helpers to read verdict/confidence/findings out of any tool's synthesis shape.
function _syn(d){ return (d&&(d.synthesis||d))||{}; }
function _conf(d){ const s=_syn(d); return s.confidence||(d&&d.confidence)||'Medium'; }
function _summary(d){ const s=_syn(d); return s.summary||(d&&d.summary)||''; }
function _findings(d){ const s=_syn(d); return s.keyFindings||s.key_findings||(d&&d.keyFindings)||[]; }
function _verdict(d){ const s=_syn(d); return (s.verdict||(d&&d.verdict)||'').toString(); }

// Each section returns {flag:'ok'|'warn'|'bad'|'na', score:0-100|null, lines:[{k,v,refs:[idx]}], note}
function secTarget(probe, refMap){
  if(!probe||!probe.ok) return {flag:'na',score:null,lines:[],note:'Target-validation probe unavailable (service degraded). Re-run to retry.'};
  const d=probe.data;
  const targets=(d.top_targets||d._ot_targets||[]);
  const hit=targets.find(t=>(t.symbol||t.approvedSymbol||'').toUpperCase()===window._curCandidate.target.toUpperCase());
  const lines=[];
  let score=50, flag='warn';
  if(hit){
    const ga=hit.genetic_association ?? hit.score ?? hit.overall_score;
    lines.push({k:'GENETIC', v:`<strong>${window._curCandidate.target}</strong> appears in OpenTargets associations for ${window._curCandidate.indication}${ga?` (association score ${(typeof ga==='number'?ga.toFixed(2):ga)})`:''}.`, refs:refMap.targetscope||[]});
    score=78; flag='ok';
  } else if(targets.length){
    lines.push({k:'GENETIC', v:`<strong>${window._curCandidate.target}</strong> was <em>not</em> among the top genetically-associated targets returned for ${window._curCandidate.indication}. The top names were ${targets.slice(0,3).map(t=>t.symbol||t.approvedSymbol).filter(Boolean).join(', ')||'—'}. This is a validation gap worth confirming.`, refs:refMap.targetscope||[]});
    score=42; flag='warn';
  } else {
    lines.push({k:'GENETIC', v:`No structured target list returned; rely on the literature synthesis below.`, refs:refMap.targetscope||[]});
  }
  const sm=_summary(d); if(sm) lines.push({k:'AI', v:sm.slice(0,420), refs:refMap.targetscope||[]});
  _findings(d).slice(0,2).forEach((f,i)=>lines.push({k:'EVID '+(i+1), v:f, refs:refMap.targetscope||[]}));
  return {flag,score,lines,note:''};
}

function secChem(probe, refMap){
  if(!probe||!probe.ok) return {flag:'na',score:null,lines:[],note:'Chemical-liability probe unavailable (compound not resolved or service degraded).'};
  const d=probe.data;
  const lines=[]; let score=60, flag='warn';
  const lip=d.lipinski||{passes:true,violations:[]};
  const veber=d.veber||{passes:true};
  if(lip.passes && veber.passes){ score=82; flag='ok'; }
  else if(!lip.passes && lip.violations && lip.violations.length>=2){ score=38; flag='bad'; }
  else { score=58; flag='warn'; }
  lines.push({k:'LIPINSKI', v: lip.passes? 'Passes Lipinski Rule of Five — drug-like physicochemistry.' : `Lipinski violations: ${(lip.violations||[]).join(', ')}. Oral bioavailability risk.`, refs:refMap.molprofile||[]});
  lines.push({k:'PROPS', v:`MW ${(+d.mw||0).toFixed(0)} · LogP ${(+d.logp||0).toFixed(2)} · TPSA ${(+d.tpsa||0).toFixed(0)} · HBD ${d.hbd||0} · HBA ${d.hba||0} · RotB ${d.rotb||0}. Veber oral ${veber.passes?'pass':'fail'}; BBB ${d.bbb_likely?'penetration plausible':'penetration unlikely'}.`, refs:refMap.molprofile||[]});
  if(d.chembl&&d.chembl.max_phase!=='' && d.chembl.max_phase!=null){
    lines.push({k:'CHEMBL', v:`Highest known development phase for this compound: <strong>Phase ${d.chembl.max_phase}</strong>${d.chembl.indication?` (${d.chembl.indication})`:''}. ${(+d.chembl.max_phase>=4)?'Already approved somewhere — strong de-risking signal.':'Not yet approved.'}`, refs:refMap.molprofile||[]});
  }
  const sm=_summary(d); if(sm) lines.push({k:'AI', v:sm.slice(0,360), refs:refMap.molprofile||[]});
  return {flag,score,lines,note:''};
}

function secPrecedent(probe, refMap){
  if(!probe||!probe.ok) return {flag:'na',score:null,lines:[],note:'Precedent probe unavailable (service degraded).'};
  const d=probe.data;
  const lines=[]; let score=55, flag='warn';
  const cands=(d.repurposing_candidates||[]);
  if(cands.length){
    const top=cands.slice(0,3).map(c=>c.drug_name||c.name).filter(Boolean);
    lines.push({k:'PRIOR ART', v:`Public mechanism/repurposing evidence for ${window._curCandidate.indication} surfaces ${cands.length} prior agent(s)${top.length?`, incl. ${top.join(', ')}`:''}. Cross-check whether your candidate's mechanism overlaps — overlap means precedent (de-risking) or a crowded field (commercial risk).`, refs:refMap.repurposerx||[]});
    score=64; flag='ok';
  } else {
    lines.push({k:'PRIOR ART', v:`No strong prior-agent precedent returned for ${window._curCandidate.indication}. Could mean genuine novelty (upside) or thin evidence (risk).`, refs:refMap.repurposerx||[]});
    score=50; flag='warn';
  }
  const sm=_summary(d); if(sm) lines.push({k:'AI', v:sm.slice(0,360), refs:refMap.repurposerx||[]});
  _findings(d).slice(0,2).forEach((f,i)=>lines.push({k:'NOTE '+(i+1), v:f, refs:refMap.repurposerx||[]}));
  return {flag,score,lines,note:''};
}

function secTrials(probe, refMap){
  if(!probe||!probe.ok) return {flag:'na',score:null,lines:[],note:'Trial-landscape probe unavailable (service degraded).'};
  const d=probe.data;
  const lines=[]; let score=55, flag='warn';
  if(d._noTrials){
    lines.push({k:'LANDSCAPE', v:`No active/recruiting trials found for ${window._curCandidate.indication}. White space — or an indication few are pursuing. Confirm before reading as opportunity.`, refs:refMap.trialmatch||[]});
    score=50; flag='warn';
  } else {
    const n=d._totalFound||(d.matches||[]).length;
    lines.push({k:'LANDSCAPE', v:`<strong>${n}</strong> active trial(s) intersect ${window._curCandidate.indication}. A dense field validates the indication but signals competition; a sparse field is differentiated but less de-risked.`, refs:refMap.trialmatch||[]});
    const tops=(d.matches||[]).slice(0,3).map(m=>`${m.trial?.nct_id||'NCT?'} (${m.trial?.phase||'phase N/A'})`);
    if(tops.length) lines.push({k:'EXAMPLES', v:`Representative trials: ${tops.join(' · ')}.`, refs:refMap.trialmatch||[]});
    score = n>=8?70 : n>=3?62 : 54;
    flag = n>=3?'ok':'warn';
    const ai=d._aiSummary&&(d._aiSummary.summary); if(ai) lines.push({k:'AI', v:ai.slice(0,340), refs:refMap.trialmatch||[]});
  }
  return {flag,score,lines,note:''};
}

function dossierVerdict(score){
  if(score>=75) return {label:'Low External Risk', color:'var(--green)', flag:'ok', desc:'The public record broadly supports this candidate across target validation, chemistry, precedent, and landscape. Proceed — with normal diligence.'};
  if(score>=55) return {label:'Moderate External Risk', color:'var(--amber)', flag:'warn', desc:'Mixed external signal. At least one dimension carries a validation gap or liability. Resolve the flagged items before committing wet-lab spend.'};
  if(score>=1)  return {label:'Elevated External Risk', color:'var(--red)', flag:'bad', desc:'The public record raises material concerns on one or more axes. Strongly recommend resolving flags or reconsidering before synthesis.'};
  return {label:'Inconclusive', color:'var(--text3)', flag:'na', desc:'Too many evidence probes were unavailable to score confidently. Re-run to retry the degraded services.'};
}

function renderDossier(candidate, probes){
  window._curCandidate = candidate;

  // Build a unified, de-duplicated citation list across all probes, and a map
  // from tool -> [citation indices] so each line can cite its real sources.
  const allSources=[]; const refMap={}; let idx=1;
  Object.values(probes).forEach(pr=>{
    if(!pr.ok) return;
    let srcs=[];
    try{ srcs=buildSources(pr.tool, pr.data)||[]; }catch(_){ srcs=[]; }
    const ids=[];
    srcs.forEach(s=>{
      const item={ id:idx, tag:s.tag, label:s.label, detail:s.detail, url:s.url };
      allSources.push(item); ids.push(idx); idx++;
    });
    refMap[pr.tool]=ids;
  });

  const sTarget=secTarget(probes.target, refMap);
  const sChem=secChem(probes.chem, refMap);
  const sPrec=secPrecedent(probes.priorart, refMap);
  const sTrials=secTrials(probes.trials, refMap);

  // External Evidence Score = weighted mean of available section scores.
  const weights={target:0.32, chem:0.30, prec:0.18, trials:0.20};
  const parts=[[sTarget.score,weights.target],[sChem.score,weights.chem],[sPrec.score,weights.prec],[sTrials.score,weights.trials]]
    .filter(([s])=>s!=null);
  const wsum=parts.reduce((a,[,w])=>a+w,0);
  const score = parts.length ? Math.round(parts.reduce((a,[s,w])=>a+s*w,0)/wsum) : 0;
  const verdict=dossierVerdict(parts.length?score:0);

  // Persist for export (reuse existing export plumbing with a synthetic id).
  lastResult = {
    id:'dossier',
    data:{ candidate, external_evidence_score:score, verdict:verdict.label,
      sections:{ target_validation:sTarget, chemical_liabilities:sChem, precedent:sPrec, trial_landscape:sTrials },
      probe_status:Object.fromEntries(Object.entries(probes).map(([k,v])=>[k,v.ok?'ok':'degraded:'+(v.error||'')])) },
    params:{ target:candidate.target, compound:candidate.compound, indication:candidate.indication },
    sources:allSources
  };

  const ringR=46, circ=2*Math.PI*ringR;
  const pct = parts.length?score:0;
  const dash = circ*(pct/100);
  const okCount=Object.values(probes).filter(p=>p.ok).length;
  const totalCount=Object.values(probes).length;

  const sectionHTML = [
    ['🎯','Target Validation Evidence', sTarget],
    ['⚗️','Chemical Liability Flags', sChem],
    ['📚','Precedent & Prior-Failure Analysis', sPrec],
    ['🧪','Competitive Trial Landscape', sTrials]
  ].map(([ico,title,sec])=>{
    const flagTxt = sec.flag==='ok'?'Supported':sec.flag==='warn'?'Caution':sec.flag==='bad'?'Concern':'No data';
    const bg = sec.flag==='ok'?'rgba(74,180,100,.12)':sec.flag==='warn'?'rgba(212,168,67,.12)':sec.flag==='bad'?'rgba(196,92,92,.14)':'var(--bg3)';
    const linesHTML = sec.lines.length ? sec.lines.map(l=>{
      const refs=(l.refs||[]).map(r=>`<a class="cite-ref" href="#dsrc-${r}" onclick="event.preventDefault();var el=document.getElementById('dsrc-${r}');if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.background='var(--glow)';setTimeout(()=>el.style.background='',1200);}">[${r}]</a>`).join('');
      return `<div class="dfind"><span class="df-k">${l.k}</span><span class="df-v">${l.v}${refs}</span></div>`;
    }).join('') : `<div class="dsec-body" style="color:var(--text3)">${sec.note||'No data returned for this section.'}</div>`;
    const scoreChip = sec.score!=null?`<span style="font-family:var(--mono);font-size:10px;color:${cc(sec.score)}">${sec.score}/100</span>`:'';
    return `<div class="dsec">
      <div class="dsec-hdr">
        <div class="dsec-ico" style="background:${bg}">${ico}</div>
        <span class="dsec-t">${title}</span>
        ${scoreChip}
        <span class="dsec-flag flag-${sec.flag}">${flagTxt}</span>
      </div>
      ${linesHTML}
    </div>`;
  }).join('');

  const probeStrip = Object.values(probes).map(pr=>{
    const col=pr.ok?'var(--green)':'var(--red)';
    return `<div class="dprobe"><i style="background:${col}"></i>${pr.label} — ${pr.ok?'ok':'degraded'}</div>`;
  }).join('');

  return `<div class="dossier-card">
    <div class="dossier-top">
      <div class="dt-row">
        <span class="dt-id">CANDIDATE RISK DOSSIER</span>
        <span class="dsec-flag flag-${verdict.flag}">${verdict.label}</span>
      </div>
      <div class="dt-name">${candidate.target} · ${candidate.compound.length>32?candidate.compound.slice(0,32)+'…':candidate.compound}</div>
      <div class="dt-meta">
        <span class="mi">Target: <span>${candidate.target}</span></span>
        <span class="mi">Compound: <span>${candidate.isSmiles?'SMILES':candidate.compound}</span></span>
        <span class="mi">Indication: <span>${candidate.indication}</span></span>
        <span class="mi">Probes: <span>${okCount}/${totalCount} live</span></span>
      </div>
    </div>

    <div class="score-wrap">
      <div class="score-ring">
        <svg width="104" height="104" viewBox="0 0 104 104">
          <circle cx="52" cy="52" r="${ringR}" fill="none" stroke="var(--bg3)" stroke-width="9"/>
          <circle cx="52" cy="52" r="${ringR}" fill="none" stroke="${verdict.color}" stroke-width="9" stroke-linecap="round"
            stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}"/>
        </svg>
        <div class="score-num"><b style="color:${verdict.color}">${parts.length?score:'—'}</b><small>EXT EVIDENCE</small></div>
      </div>
      <div class="score-verdict">
        <div class="sv-label" style="color:${verdict.color}">${verdict.label}</div>
        <div class="sv-desc">${verdict.desc}</div>
        <div class="score-legend">
          <span><i style="background:var(--green)"></i>75–100 low risk</span>
          <span><i style="background:var(--amber)"></i>55–74 moderate</span>
          <span><i style="background:var(--red)"></i>1–54 elevated</span>
        </div>
      </div>
    </div>

    ${sectionHTML}

    <div class="dsec">
      <div class="dsec-hdr"><div class="dsec-ico" style="background:var(--bg3)">🛰️</div><span class="dsec-t">Evidence Probe Status</span></div>
      ${probeStrip}
    </div>

    <div class="dbanner">
      <strong>How to read this:</strong> the External Evidence Score is a weighted synthesis of what <em>public</em> sources (OpenTargets, ChEMBL, PubChem, PubMed, ClinicalTrials.gov) report about this target–compound–indication triple. It is an independent second opinion sourced entirely outside any private model — not a prediction of clinical success, and not clinical advice. Every claim is traceable to a cited primary source below. Research use only.
    </div>

    ${sourcesPanelDossier(allSources)}
    ${exportBar('dossier')}
  </div>`;
}

// Dossier-specific sources panel with anchor ids so in-text [n] refs can jump.
function sourcesPanelDossier(sources){
  if(!sources||!sources.length) return `<div class="dsec"><div class="dsec-body" style="color:var(--text3)">No external sources were retrievable for this candidate — likely all probes degraded. Re-run to retry.</div></div>`;
  const items=sources.map(s=>`
    <div class="source-item" id="dsrc-${s.id}" style="transition:background .4s">
      <span class="source-idx">[${s.id}]</span>
      <div class="source-body">
        <span class="source-tag">${s.tag}</span>
        ${s.url?`<a href="${s.url}" target="_blank" rel="noopener">${s.label}</a>`:s.label}
        ${s.detail?`<div style="color:var(--text3);font-size:10px;margin-top:2px">${s.detail}</div>`:''}
      </div>
    </div>`).join('');
  return `<div class="sources-panel">
    <div class="sources-hdr"><span>📚 Cited Sources (fused across all probes)</span><span class="sources-count">${sources.length} reference${sources.length>1?'s':''}</span></div>
    ${items}
  </div>`;
}

function render(id,data,p){
  const map={scisynth:rSci,targetscope:rTarget,bindpredict:rBind,biosignal:rBio,repurposerx:rRepurpose,trialmatch:rTrial,alphamissense:rAM,molprofile:rMol,combinedrx:rCombined,immuniq:rImmunIQ,pathogenrx:rPathogen};
  const sources = buildSources(id, data);
  lastResult = { id, data, params: p, sources };
  const fn = map[id];
  if (!fn) return `<div class="rcard"><pre>${JSON.stringify(data,null,2)}</pre></div>`;
  return fn(data, p);
}

function hcta(id,data){
  const hs=HANDOFFS[id];if(!hs||!hs.length)return'';
  const btns=hs.map(h=>{const v=h.v(data);return `<button class="hbtn" onclick="doHandoff('${h.to}','${h.fld}','${v.replace(/'/g,'&#39;')}')">${h.lbl}</button>`;}).join('');
  return `<div class="hcta"><span class="hlbl">Next step:</span>${btns}</div>`;
}

const activeViewers = {};

function show3DViewer(scope, uniprotId, pdbUrl, protName, mutResidue) {
  const container = document.getElementById('viewer-' + scope + '-container');
  if (!container) return;
  if (activeViewers[scope]) { container.innerHTML = ''; delete activeViewers[scope]; return; }

  const hasMutation = mutResidue && mutResidue > 0;
  container.innerHTML = `
    <div class="viewer-panel">
      <div class="viewer-hdr">
        <span class="viewer-title">🧬 ${protName} Structure</span>
        <span class="viewer-id">${uniprotId}</span>
        <div class="viewer-ctrls">
          <button class="vctrl active" data-mode="plddt" onclick="changeViewMode('${scope}','plddt')">pLDDT</button>
          <button class="vctrl" data-mode="spectrum" onclick="changeViewMode('${scope}','spectrum')">Rainbow</button>
          <button class="vctrl" data-mode="cartoon" onclick="changeViewMode('${scope}','cartoon')">Plain</button>
          ${hasMutation ? `<button class="vctrl" data-mode="mutation" onclick="changeViewMode('${scope}','mutation')">Highlight Mutation</button>` : ''}
          <button class="vctrl" onclick="document.getElementById('viewer-${scope}-container').innerHTML='';delete activeViewers['${scope}']">Close</button>
        </div>
      </div>
      <div class="viewer-body" id="viewer-${scope}-body">
        <div class="viewer-loading" id="viewer-${scope}-loading">
          <div class="spinner" style="width:28px;height:28px"></div>
          <div>Loading structure from AlphaFold DB...</div>
        </div>
      </div>
      <div class="viewer-legend">
        <div class="legend-item"><div class="legend-sq" style="background:#0053D6"></div>Very high (pLDDT > 90)</div>
        <div class="legend-item"><div class="legend-sq" style="background:#65CBF3"></div>Confident (70–90)</div>
        <div class="legend-item"><div class="legend-sq" style="background:#FFDB13"></div>Low (50–70)</div>
        <div class="legend-item"><div class="legend-sq" style="background:#FF7D45"></div>Very low (< 50)</div>
        <span class="viewer-hint">Drag to rotate · Scroll to zoom</span>
      </div>
    </div>
  `;

  // Initialize 3Dmol.js viewer
  setTimeout(() => {
    if (typeof $3Dmol === 'undefined') {
      document.getElementById('viewer-' + scope + '-loading').innerHTML =
        '<div style="color:var(--amber)">3Dmol.js failed to load. Check your connection.</div>';
      return;
    }
    const viewerEl = document.getElementById('viewer-' + scope + '-body');
    const viewer = $3Dmol.createViewer(viewerEl, { backgroundColor: '#0a0e0b' });
    activeViewers[scope] = { viewer, uniprotId, mutResidue: mutResidue || 0, mode: 'plddt' };

    // AlphaFold DB PDB URL pattern
    const url = pdbUrl || `https://alphafold.ebi.ac.uk/files/AF-${uniprotId}-F1-model_v4.pdb`;

    fetch(url)
      .then(r => {
        if (!r.ok) throw new Error('PDB fetch failed: ' + r.status);
        return r.text();
      })
      .then(pdbData => {
        viewer.addModel(pdbData, 'pdb');
        applyViewMode(scope, 'plddt');
        viewer.zoomTo();
        viewer.render();
        const loader = document.getElementById('viewer-' + scope + '-loading');
        if (loader) loader.classList.add('hidden');
      })
      .catch(err => {
        const loader = document.getElementById('viewer-' + scope + '-loading');
        if (loader) loader.innerHTML = '<div style="color:var(--amber)">Could not load structure: ' + err.message + '</div>';
      });
  }, 50);
}

function applyViewMode(scope, mode) {
  const state = activeViewers[scope];
  if (!state) return;
  const { viewer, mutResidue } = state;
  state.mode = mode;

  viewer.removeAllSurfaces();
  viewer.setStyle({}, {});

  if (mode === 'plddt') {
    // AlphaFold pLDDT coloring — bfactor in PDB holds pLDDT score
    viewer.setStyle({}, {
      cartoon: {
        colorfunc: (atom) => {
          const b = atom.b || 50;
          if (b > 90) return '#0053D6';
          if (b > 70) return '#65CBF3';
          if (b > 50) return '#FFDB13';
          return '#FF7D45';
        }
      }
    });
  } else if (mode === 'spectrum') {
    viewer.setStyle({}, { cartoon: { color: 'spectrum' } });
  } else if (mode === 'cartoon') {
    viewer.setStyle({}, { cartoon: { color: '#4ab464' } });
  } else if (mode === 'mutation' && mutResidue > 0) {
    // Grey cartoon + highlighted mutation residue
    viewer.setStyle({}, { cartoon: { color: '#556755' } });
    viewer.addStyle({ resi: mutResidue }, {
      cartoon: { color: '#ff3333' },
      stick: { color: '#ff3333', radius: 0.3 }
    });
    viewer.addResLabels({ resi: mutResidue }, {
      fontColor: '#ffffff',
      backgroundColor: '#ff3333',
      fontSize: 12,
      showBackground: true
    });
    viewer.zoomTo({ resi: mutResidue });
  }
  viewer.render();
}

function changeViewMode(scope, mode) {
  applyViewMode(scope, mode);
  document.querySelectorAll('#viewer-' + scope + '-container .vctrl[data-mode]').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
}

  return `You are the DrugIQ Assistant, a concise, friendly guide embedded in the DrugIQ platform — a drug-discovery research tool with 11 specialised tools plus a flagship Candidate Dossier.

Your job: (1) help users understand what DrugIQ does, (2) recommend the RIGHT tool for their goal, (3) give short "assisted prompts" (concrete example inputs), and (4) when you recommend a tool, emit an ACTION TOKEN so the UI can open it pre-filled.

TOOLS:
${catalog}

ACTION TOKEN FORMAT — when you want to offer to open a tool, end your message with a token on its own line:
<<OPEN:toolid|field=value;field=value>>
Examples:
<<OPEN:molprofile|compound=Sotorasib>>
<<OPEN:dossier|target=KRAS;compound=Sotorasib;indication=Non-small cell lung cancer>>
<<OPEN:trialmatch|disease=Melanoma>>
Only include fields you actually have. If you have no specific values, still emit the token with just the toolid (e.g. <<OPEN:targetscope>>). Emit at most ONE token per reply, and only when suggesting a tool.

STYLE: 2–4 sentences max. Plain language a non-scientist can follow. Never invent clinical facts or claim DrugIQ designs/approves drugs — it surfaces public evidence and links to external research models. Research use only. If asked something off-topic, gently steer back to drug discovery and the platform.`;
}

function cbotEsc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function cbotFmt(s){ // light markdown: **bold**, *italic*, `code`

    .replace(/(^|[^*])\*([^*]+)\*(?!\*)/g,'$1<em>$2</em>')

// Parse <<OPEN:tool|field=value;...>> from model output → {clean, action}
function cbotParseAction(text){
  const m=text.match(/<<OPEN:([a-z]+)(?:\|([^>]*))?>>/i);
  if(!m) return {clean:text.trim(), action:null};
  const tool=m[1].toLowerCase();
  if(tool!=='dossier' && !T[tool]) return {clean:text.replace(m[0],'').trim(), action:null};
  const fields={};
  if(m[2]){ m[2].split(';').forEach(pair=>{const i=pair.indexOf('=');if(i>0){const k=pair.slice(0,i).trim();const v=pair.slice(i+1).trim();if(k&&v)fields[k]=v;}}); }
  const clean=text.replace(m[0],'').trim();
  return {clean, action:{tool,fields}};
}

// Execute an action: enter app, open tool, pre-fill fields.
function cbotAction(action){
  gtag('event','chatbot_action',{tool:action.tool});
  const tool=action.tool, fields=action.fields||{};
  const doFill=()=>{
    Object.entries(fields).forEach(([k,v])=>{
      const el=document.getElementById((tool==='dossier'?'f-d-':'f-')+k) || document.getElementById('f-'+k);
      if(el){el.value=v;el.style.borderColor='var(--teal)';}
    });
    if(fields.disease){const g=document.getElementById('gDisease');if(g)g.value=fields.disease;}
    if(fields.indication){const g=document.getElementById('gDisease');if(g)g.value=fields.indication;}
  };
  if(document.body.classList.contains('app-active')){ go(tool); setTimeout(doFill,200); }
  else { enterApp(tool); setTimeout(doFill,800); }
  // keep the panel but collapse on mobile
  if(window.innerWidth<=520) cbotToggle();
}

// The brain. Path C: try /chat, fall back to /synthesize. Real LLM either way.
const CBOT_CHAT_URL='https://scisynth-server.onrender.com/chat';      // optional future endpoint
const CBOT_SYNTH_URL='https://scisynth-server.onrender.com/synthesize'; // existing endpoint
let cbotChatEndpointOk=null; // null=unknown, true/false after first try

async function cbotLLM(userText){
  CBOT.history.push({role:'user',content:userText});
  const recent=CBOT.history.slice(-8);

  // Attempt 1: dedicated /chat endpoint (if you add it later, this lights up automatically)
  if(cbotChatEndpointOk!==false){
    try{
      const r=await fetch(CBOT_CHAT_URL,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({system:cbotSystemPrompt(),messages:recent})});
      if(r.ok){
        const d=await r.json();
        const reply=d.reply||d.message||d.content||d.text||'';
        if(reply){cbotChatEndpointOk=true;CBOT.history.push({role:'assistant',content:reply});return reply;}
      }
      if(r.status===404) cbotChatEndpointOk=false; // endpoint doesn't exist → stop trying
    }catch(_){ /* fall through */ }
  }

  // Attempt 2: smuggle the conversation through /synthesize (works today, no backend change)
  const convo=recent.map(m=>(m.role==='user'?'User: ':'Assistant: ')+m.content).join('\n');
  const r2=await fetch(CBOT_SYNTH_URL,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      hypothesis:'You are answering as the DrugIQ Assistant. Reply to the latest user message conversationally.',
      papers:[{
        title:'DrugIQ Assistant conversation',
        authors:'DrugIQ',year:'2025',journal:'Platform Guidance',
        abstract: cbotSystemPrompt()+'\n\nCONVERSATION SO FAR:\n'+convo+'\n\nWrite ONLY the assistant\'s next reply (2-4 sentences). If recommending a tool, append the action token on its own line as instructed above.'
      }]
    })});
  if(!r2.ok){ if(r2.status===429) throw new Error('rate_limit'); throw new Error('backend'); }
  const d2=await r2.json();
  const reply=(d2.summary||d2.reply||'').trim() || "I'm here to help you navigate DrugIQ — could you rephrase that?";
  CBOT.history.push({role:'assistant',content:reply});
  return reply;
}

// Degraded fallback when the backend is unreachable/asleep: honest message + shortcut chips.
function cbotDegraded(){
  const body=document.getElementById('cbot-body');
  cbotAddBot("My AI brain is waking up or unreachable right now (the free-tier backend sleeps after inactivity). Give it ~30s and retry — or jump straight in with one of these:");
  const wrap=document.createElement('div');wrap.className='cb-chips';

}

async function cbotSend(forced){
  const input=document.getElementById('cbot-input');
  const text=(forced!=null?forced:input.value).trim();
  if(!text||CBOT.busy)return;
  if(forced==null){input.value='';cbotGrow(input);}
  cbotAddUser(text);
  CBOT.busy=true;
  document.getElementById('cbot-send').disabled=true;
  document.getElementById('cbot-status').textContent='Thinking…';
  cbotTyping(true);
  try{
    const raw=await cbotLLM(text);
    const {clean,action}=cbotParseAction(raw);
    cbotTyping(false);
    cbotAddBot(clean||"Here's something that might help:", action);
    document.getElementById('cbot-status').textContent='Ready to help you navigate';
  }catch(e){
    cbotTyping(false);
    if(e.message==='rate_limit'){ cbotAddBot("I've hit the AI request limit for a moment — wait ~30 seconds and try again. Meanwhile you can use these:"); }
    document.getElementById('cbot-status').textContent='Backend unavailable';
    cbotDegraded();
    gtag('event','chatbot_error',{error:e.message});
  }
  CBOT.busy=false;
  document.getElementById('cbot-send').disabled=false;
}

// ── PROCEDURAL SVG VISUALS (no external assets) ───────────────────────────────
function svgMolecule(){
  let atoms='',bonds='';const pts=[];const N=7;
  for(let i=0;i<N;i++){const a=(i/N)*Math.PI*2;const r=120+(i%2?40:0);pts.push([200+Math.cos(a)*r,200+Math.sin(a)*r]);}
  pts.push([200,200]);
  for(let i=0;i<N;i++){bonds+=`<line x1="${pts[i][0]}" y1="${pts[i][1]}" x2="200" y2="200" stroke="var(--border2)" stroke-width="2"/>`;
    if(i<N-1)bonds+=`<line x1="${pts[i][0]}" y1="${pts[i][1]}" x2="${pts[i+1][0]}" y2="${pts[i+1][1]}" stroke="var(--border)" stroke-width="1.5"/>`;}
  pts.forEach((p,i)=>{const last=i===pts.length-1;atoms+=`<circle cx="${p[0]}" cy="${p[1]}" r="${last?13:8}" fill="${last?'var(--green)':'var(--teal)'}" opacity="${last?1:.85}"><animate attributeName="r" values="${last?13:8};${last?16:11};${last?13:8}" dur="${2+i*0.3}s" repeatCount="indefinite"/></circle>`;});
  return `<svg viewBox="0 0 400 400"><g style="transform-origin:200px 200px"><animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="40s" repeatCount="indefinite"/>${bonds}${atoms}</g></svg>`;
}
function svgNetwork(){
  const nodes=[];for(let i=0;i<14;i++){nodes.push([60+Math.random()*280,60+Math.random()*280]);}
  let lines='';for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const d=Math.hypot(nodes[i][0]-nodes[j][0],nodes[i][1]-nodes[j][1]);if(d<130)lines+=`<line x1="${nodes[i][0]}" y1="${nodes[i][1]}" x2="${nodes[j][0]}" y2="${nodes[j][1]}" stroke="var(--border)" stroke-width="1"/>`;}
  let dots='';nodes.forEach((n,i)=>{dots+=`<circle cx="${n[0]}" cy="${n[1]}" r="${4+Math.random()*4}" fill="${i%3?'var(--teal)':'var(--green)'}"><animate attributeName="opacity" values="0.4;1;0.4" dur="${2+Math.random()*3}s" repeatCount="indefinite"/></circle>`;});
  return `<svg viewBox="0 0 400 400">${lines}${dots}</svg>`;
}
function svgGauge(){
  const r=130,c=2*Math.PI*r,pct=78,dash=c*pct/100;
  return `<svg viewBox="0 0 400 400"><circle cx="200" cy="200" r="${r}" fill="none" stroke="var(--bg3)" stroke-width="20"/><circle cx="200" cy="200" r="${r}" fill="none" stroke="var(--green)" stroke-width="20" stroke-linecap="round" stroke-dasharray="0 ${c}" transform="rotate(-90 200 200)"><animate attributeName="stroke-dasharray" values="0 ${c};${dash} ${c}" dur="2s" fill="freeze" begin="0.3s"/></circle><text x="200" y="195" text-anchor="middle" font-family="Fraunces,serif" font-size="62" fill="var(--green)">78</text><text x="200" y="230" text-anchor="middle" font-family="DM Mono,monospace" font-size="13" fill="var(--text3)" letter-spacing="2">EXT EVIDENCE</text></svg>`;
}

// ── CANVAS BACKDROP (drifting molecular particle field) ───────────────────────
let lpCanvasRAF=null;
function startCanvas(){
  const cv=document.getElementById('lp-canvas');if(!cv)return;
  const ctx=cv.getContext('2d');let W,H,parts=[];
  function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  const COUNT=Math.min(70,Math.floor(window.innerWidth/22));
  for(let i=0;i<COUNT;i++)parts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,r:1+Math.random()*2});
  let scrollY=0;window.addEventListener('scroll',()=>{scrollY=window.scrollY;},{passive:true});
  function draw(){
    ctx.clearRect(0,0,W,H);
    const drift=scrollY*0.15;
    for(let i=0;i<parts.length;i++){const p=parts[i];p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      const py=(p.y-drift);
      for(let j=i+1;j<parts.length;j++){const q=parts[j];const dx=p.x-q.x,dy=p.y-q.y;const d=Math.hypot(dx,dy);
        if(d<130){ctx.strokeStyle='rgba(74,180,100,'+(0.10*(1-d/130))+')';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(p.x,py);ctx.lineTo(q.x,q.y-drift);ctx.stroke();}}
      ctx.fillStyle='rgba(69,179,162,0.5)';ctx.beginPath();ctx.arc(p.x,py,p.r,0,7);ctx.fill();
    }
    lpCanvasRAF=requestAnimationFrame(draw);
  }
  draw();
}
function stopCanvas(){if(lpCanvasRAF)cancelAnimationFrame(lpCanvasRAF);lpCanvasRAF=null;const cv=document.getElementById('lp-canvas');if(cv){const ctx=cv.getContext('2d');ctx&&ctx.clearRect(0,0,cv.width,cv.height);}}

  function revealAll(){
    document.querySelectorAll('#landing-view [data-hero],#landing-view [data-spot],#landing-view .lp-reveal,#landing-view .lp-h1 .word')
      .forEach(el=>{el.style.opacity='1';el.style.transform='none';});
  }
  if(reduced || !haveGSAP){ revealAll(); }
  if(!reduced) startCanvas();
  // Smooth scroll (only when motion allowed)
  if(window.Lenis && !reduced){
    lenis=new Lenis({duration:1.1,easing:t=>Math.min(1,1.001-Math.pow(2,-10*t)),smoothWheel:true});
    function raf(t){lenis.raf(t);requestAnimationFrame(raf);}requestAnimationFrame(raf);
    if(haveGSAP){lenis.on('scroll',ScrollTrigger.update);}
  }
  if(haveGSAP && !reduced){
    gsap.registerPlugin(ScrollTrigger);
    const tl=gsap.timeline({defaults:{ease:'power3.out'}});
    tl.to('[data-hero="eyebrow"]',{opacity:1,duration:.6,delay:.2})
      .to('.lp-h1 .word',{opacity:1,y:0,duration:.7,stagger:.06},'-=.2')
      .to('[data-hero="lead"]',{opacity:1,y:0,duration:.7},'-=.3')
      .to('[data-hero="cta"]',{opacity:1,y:0,duration:.7},'-=.4')
      .to('[data-hero="hint"]',{opacity:1,duration:.6},'-=.2');
    gsap.utils.toArray('.lp-reveal').forEach(el=>{
      gsap.to(el,{opacity:1,y:0,duration:.9,ease:'power3.out',scrollTrigger:{trigger:el,start:'top 85%'}});
    });
    const track=document.querySelector('.lp-chain-track');
    if(track){
      const scrollLen=()=>track.scrollWidth-window.innerWidth+window.innerWidth*0.1;
      gsap.to(track,{x:()=>-scrollLen(),ease:'none',
        scrollTrigger:{trigger:'.lp-chain',start:'top top',end:()=>'+='+(track.scrollWidth),scrub:1,pin:'.lp-chain-pin',invalidateOnRefresh:true}});
    }
    gsap.utils.toArray('[data-spot]').forEach((el,i)=>{
      gsap.fromTo(el,{opacity:0,y:30},{opacity:1,y:0,duration:.8,ease:'power3.out',scrollTrigger:{trigger:'.lp-spotlight',start:'top 60%'},delay:i*.1});
    });
    ScrollTrigger.refresh();
  }
}
function destroyLanding(){
  stopCanvas();
  if(window.ScrollTrigger){ScrollTrigger.getAll().forEach(t=>t.kill());}
  if(lenis){lenis.destroy();lenis=null;}
  document.getElementById('landing-view').innerHTML='';
}
function lpScrollTo(sel){const el=document.querySelector(sel);if(!el)return;if(lenis){lenis.scrollTo(el,{offset:0});}else{el.scrollIntoView({behavior:'smooth'});}}

// ── VIEW ROUTER (landing ⇄ app) with veil transition ──────────────────────────
function showLanding(skipHash){
  const veil=document.getElementById('veil');veil.classList.add('show');
  setTimeout(()=>{
    document.body.classList.remove('app-active');document.body.classList.add('landing-active');
    window.scrollTo(0,0);
    initLanding();
    if(!skipHash) location.hash='';
    setTimeout(()=>veil.classList.remove('show'),60);
  },500);
}
function enterApp(id){
  const veil=document.getElementById('veil');veil.classList.add('show');
  setTimeout(()=>{
    destroyLanding();
    document.body.classList.remove('landing-active');document.body.classList.add('app-active');
    window.scrollTo(0,0);
    go(id||'dossier');
    setTimeout(()=>veil.classList.remove('show'),60);
  },500);
}
function backToHome(){showLanding();}

// ── ROUTING ───────────────────────────────────────────────────────────────────
window.addEventListener('hashchange', () => {
  const raw = location.hash.replace(/^#/, '');
  if(raw==='' || raw==='home' || raw==='landing'){ if(!document.body.classList.contains('landing-active')) showLanding(true); return; }
  const id = raw || 'welcome';
  if (id === 'welcome' || id === 'dossier' || T[id]){
    if(!document.body.classList.contains('app-active')){ enterApp(id); }
    else go(id, true);
  }
});

// ── INIT ──────────────────────────────────────────────────────────────────────
(function() {
  const raw = location.hash.replace(/^#/, '');
  if(raw==='' || raw==='home' || raw==='landing'){
    document.body.classList.add('landing-active');
    initLanding();
  } else {
    const id = (raw==='dossier' || T[raw]) ? raw : 'welcome';
    document.body.classList.add('app-active');
    go(id, true);
  }
})();
</script>
